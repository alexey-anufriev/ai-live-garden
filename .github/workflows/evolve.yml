name: Agent Run
run-name: "Agent Run - ${{ github.run_number }}"

on:
  workflow_dispatch:

concurrency:
  group: ai-live-garden-main
  cancel-in-progress: false

permissions:
  contents: write

env:
  EXECUTION_MODEL: ${{ vars.AGENT_EXECUTION_MODEL || 'gemini-3.1-flash-lite' }}
  GEMINI_CLI_VERSION: "0.50.0"

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Freeze autonomous run policy date
        shell: bash
        run: echo "AGENT_PM_REFERENCE_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Validate autonomous harness contracts
        id: harness_contracts
        shell: bash
        run: scripts/test-agent-harness.sh

      - name: Set up Java
        id: setup_java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Baseline test
        id: baseline_test
        continue-on-error: true
        timeout-minutes: 4
        run: scripts/capture-maven-test-result.sh "${RUNNER_TEMP}/baseline-test-result.md"

      - name: Baseline worktree policy
        id: baseline_policy
        continue-on-error: true
        shell: bash
        env:
          VALIDATE_AGENT_WORKTREE_SCOPE: baseline
        run: scripts/capture-agent-worktree-policy-result.sh "${RUNNER_TEMP}/baseline-policy-result.md"

      - name: Enforce observation window
        id: observation_window
        if: ${{ !cancelled() && steps.harness_contracts.outcome == 'success' && steps.setup_java.outcome == 'success' && steps.baseline_test.outcome == 'success' && steps.baseline_policy.outcome == 'success' }}
        shell: bash
        run: scripts/check-agent-observation-window.sh

      - name: Capture baseline shadow simulation
        id: baseline_shadow
        if: ${{ !cancelled() && steps.harness_contracts.outcome == 'success' && steps.setup_java.outcome == 'success' && steps.baseline_test.outcome == 'success' && steps.observation_window.outputs.ready == 'true' }}
        continue-on-error: true
        shell: bash
        run: |
          capture_status=0
          scripts/capture-shadow-simulation.sh "${RUNNER_TEMP}/baseline-shadow.json" || capture_status=$?
          cp "${RUNNER_TEMP}/baseline-shadow.json" target/agent-baseline-shadow.json
          exit "$capture_status"

      - name: Build Gemini prompt
        id: gemini_prompt
        if: ${{ !cancelled() && steps.harness_contracts.outcome == 'success' && steps.setup_java.outcome == 'success' && (steps.observation_window.outcome == 'skipped' || steps.observation_window.outputs.ready == 'true') }}
        shell: bash
        env:
          AGENT_CONTEXT_METADATA_FILE: ${{ runner.temp }}/agent-context.metadata
          AGENT_BASELINE_TEST_RESULT_FILE: ${{ runner.temp }}/baseline-test-result.md
          AGENT_BASELINE_POLICY_RESULT_FILE: ${{ runner.temp }}/baseline-policy-result.md
          AGENT_BASELINE_SHADOW_FILE: target/agent-baseline-shadow.json
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: |
          scripts/build-agent-context.sh "${RUNNER_TEMP}/agent-context.md" || {
            status=$?
            echo "::error::Agent context generation failed with exit code ${status}."
            exit "$status"
          }
          scripts/write-output-file.sh text "${RUNNER_TEMP}/agent-context.md" || {
            status=$?
            echo "::error::Publishing the agent context to GITHUB_OUTPUT failed with exit code ${status}."
            exit "$status"
          }

      - name: Record Gemini model diagnostics
        if: ${{ !cancelled() && steps.gemini_prompt.outcome == 'success' }}
        shell: bash
        run: scripts/write-gemini-model-diagnostics.sh

      - name: Run Gemini autonomous step
        id: gemini
        if: ${{ !cancelled() && steps.gemini_prompt.outcome == 'success' }}
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ env.GEMINI_CLI_VERSION }}
          gemini_model: ${{ env.EXECUTION_MODEL }}
          prompt: ${{ steps.gemini_prompt.outputs.text }}
          upload_artifacts: true

      - name: Restore protected files after attempt 1
        id: restore_protected_attempt_1
        if: ${{ !cancelled() && steps.gemini.outcome == 'success' }}
        shell: bash
        run: scripts/restore-agent-protected-files.sh

      - name: Assess autonomous attempt 1
        id: attempt_1_assessment
        if: ${{ !cancelled() && steps.gemini.outcome == 'success' && steps.restore_protected_attempt_1.outcome == 'success' }}
        shell: bash
        env:
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: scripts/assess-agent-attempt.sh 1 gemini-artifacts "${RUNNER_TEMP}/baseline-shadow.json" "${RUNNER_TEMP}/agent-attempt-1.json"

      - name: Resolve autonomous experiment
        id: attempt_resolution
        if: ${{ !cancelled() && steps.attempt_1_assessment.outcome == 'success' }}
        shell: bash
        run: scripts/resolve-agent-attempts.sh "${RUNNER_TEMP}/agent-attempt-ledger.json" "${RUNNER_TEMP}/agent-attempt-1.json"

      - name: Inspect accepted Gemini autonomous result
        id: gemini_primary_inspect
        if: ${{ !cancelled() && steps.attempt_resolution.outputs.accepted == 'true' }}
        shell: bash
        env:
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: scripts/inspect-agent-gemini-output.sh --fail-on-noop gemini-artifacts

      - name: Publish substantive incomplete candidate
        id: publish_incomplete_candidate
        if: ${{ !cancelled() && steps.attempt_resolution.outputs.exhausted == 'true' && steps.attempt_resolution.outputs.best_candidate_commit != '' }}
        shell: bash
        env:
          REJECTED_CANDIDATE_SOURCE_COMMIT: ${{ steps.attempt_resolution.outputs.best_candidate_commit }}
        run: scripts/publish-rejected-candidate.sh

      - name: Persist incomplete agent result for the next run
        id: defer_agent_incomplete
        if: ${{ !cancelled() && steps.attempt_resolution.outputs.exhausted == 'true' }}
        shell: bash
        env:
          INCOMPLETE_CANDIDATE_BRANCH: ${{ steps.publish_incomplete_candidate.outputs.branch }}
          INCOMPLETE_CANDIDATE_COMMIT: ${{ steps.publish_incomplete_candidate.outputs.commit }}
          HANDOFF_VALIDATION_REASON: "The single experiment stopped at ${{ steps.attempt_resolution.outputs.stage }}: ${{ steps.attempt_resolution.outputs.reason }}"
          AGENT_ATTEMPT_LEDGER_FILE: ${{ steps.attempt_resolution.outputs.ledger_file }}
        run: scripts/defer-agent-incomplete.sh gemini-artifacts "experiment-unsafe-or-invalid" agent/shadow-feedback.md

      - name: Commit incomplete agent feedback
        id: commit_agent_feedback
        if: ${{ !cancelled() && steps.defer_agent_incomplete.outcome == 'success' }}
        shell: bash
        env:
          COMMIT_MESSAGE_PREFIX: "chore: record incomplete autonomous run"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%dT%H:%MZ"
        run: scripts/commit-if-changed.sh agent/shadow-feedback.md

      - name: Clean unreferenced incomplete candidate branches
        id: cleanup_incomplete_candidates
        if: ${{ !cancelled() && steps.commit_agent_feedback.outcome == 'success' }}
        shell: bash
        run: |
          mapfile -t referenced_branches < <(sed -n 's/^- Branch: `\(agent-rejected\/[a-zA-Z0-9._-]*\)`$/\1/p' agent/shadow-feedback.md)
          scripts/cleanup-rejected-candidate-branches.sh "${referenced_branches[@]}" || echo "::warning::Incomplete candidate branch cleanup will be retried by a later run."

      - name: Extract agent handoff from Gemini output
        id: extract_agent_handoff
        if: ${{ !cancelled() && steps.attempt_resolution.outputs.accepted == 'true' && steps.gemini_primary_inspect.outputs.valid_handoff == 'true' && steps.gemini_primary_inspect.outputs.substantive_change == 'true' }}
        shell: bash
        env:
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: scripts/extract-agent-handoff.sh --output .agent-run.json gemini-artifacts

      - name: Validate agent handoff
        id: agent_handoff
        if: ${{ !cancelled() && steps.extract_agent_handoff.outcome == 'success' }}
        shell: bash
        env:
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: scripts/validate-agent-handoff.sh .agent-run.json

      - name: Validate tests after Gemini changes
        id: post_test_final
        if: ${{ !cancelled() && steps.agent_handoff.outcome == 'success' }}
        timeout-minutes: 4
        shell: bash
        env:
          VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ runner.temp }}/post-test-violations.txt
        run: scripts/validate-tests.sh

      - name: Validate agent worktree before memory
        id: agent_worktree_repair_input
        if: ${{ !cancelled() && steps.agent_handoff.outcome == 'success' }}
        shell: bash
        env:
          VALIDATE_AGENT_WORKTREE_SCOPE: changed
          VALIDATE_AGENT_WORKTREE_VIOLATIONS_FILE: ${{ runner.temp }}/agent-worktree-repair-input-violations.txt
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: scripts/validate-agent-worktree.sh

      - name: Fail on hard pre-memory worktree policy
        if: ${{ !cancelled() && steps.agent_worktree_repair_input.outputs.severity == 'hard' }}
        shell: bash
        run: |
          echo "Hard agent worktree policy violations cannot be committed as autonomous repair input."
          cat "${RUNNER_TEMP}/agent-worktree-repair-input-violations.txt"
          exit 1

      - name: Derive validation policy from run mode
        id: validation_policy
        if: ${{ !cancelled() && steps.post_test_final.outcome == 'success' && steps.agent_worktree_repair_input.outputs.severity == 'clean' }}
        shell: bash
        env:
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          AGENT_BASELINE_SHADOW_OUTCOME: ${{ steps.baseline_shadow.outcome }}
        run: scripts/derive-agent-validation-policy.sh .agent-run.json

      - name: Confirm candidate validation
        id: candidate_validation
        if: ${{ !cancelled() && steps.attempt_resolution.outputs.accepted == 'true' && steps.validation_policy.outcome == 'success' }}
        shell: bash
        run: echo "Candidate accepted as ${{ steps.attempt_resolution.outputs.acceptance }} progress by the authoritative attempt assessment."

      - name: Snapshot accepted handoff for finalization recovery
        id: snapshot_accepted_handoff
        if: ${{ !cancelled() && steps.candidate_validation.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: cp .agent-run.json "${RUNNER_TEMP}/accepted-agent-run.json"

      - name: Prepare experiment verdict for the next run
        id: prepare_experiment_verdict
        if: ${{ !cancelled() && steps.snapshot_accepted_handoff.outcome == 'success' && steps.validation_policy.outputs.run_mode == 'evolution' }}
        continue-on-error: true
        shell: bash
        run: scripts/record-agent-verdict.sh "${RUNNER_TEMP}/agent-attempt-ledger.json" "${RUNNER_TEMP}/accepted-agent-run.json" "${RUNNER_TEMP}/agent-shadow-feedback.md"

      - name: Advance persistent garden state
        id: advance_garden
        if: ${{ !cancelled() && steps.candidate_validation.outcome == 'success' && steps.validation_policy.outputs.advance_garden == 'true' }}
        continue-on-error: true
        run: mvn -B -q exec:java -Dexec.args="tick --steps 3"

      - name: Generate memory artifacts
        id: auto_memory
        if: ${{ !cancelled() && steps.candidate_validation.outcome == 'success' && (steps.advance_garden.outcome == 'success' || steps.advance_garden.outcome == 'skipped') }}
        continue-on-error: true
        shell: bash
        env:
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
        run: scripts/agent-auto-postprocess.sh --test-outcome "${{ steps.post_test_final.outcome }}" --garden-advance-outcome "${{ steps.advance_garden.outcome }}" --worktree-policy-severity "${{ steps.agent_worktree_repair_input.outputs.severity }}" --checks "mvn -B test"

      - name: Record experiment verdict for the next run
        id: record_experiment_verdict
        if: ${{ !cancelled() && steps.auto_memory.outcome == 'success' && steps.prepare_experiment_verdict.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: mv "${RUNNER_TEMP}/agent-shadow-feedback.md" agent/shadow-feedback.md

      - name: Synchronize generated journal with final paths
        id: sync_agent_journal
        if: ${{ !cancelled() && steps.auto_memory.outcome == 'success' && (steps.record_experiment_verdict.outcome == 'success' || steps.validation_policy.outputs.run_mode != 'evolution') }}
        continue-on-error: true
        shell: bash
        run: scripts/sync-agent-journal-paths.sh

      - name: Validate required memory updates
        id: required_memory_final
        if: ${{ !cancelled() && steps.sync_agent_journal.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          POST_TEST_OUTCOME: ${{ steps.post_test_final.outcome }}
          GARDEN_ADVANCE_OUTCOME: ${{ steps.advance_garden.outcome }}
          VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ runner.temp }}/required-memory-violations.txt
        run: scripts/validate-required-memory-updates.sh

      - name: Validate journal format
        id: journal_format_final
        if: ${{ !cancelled() && steps.required_memory_final.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          JOURNAL_MVN_TEST_OUTCOME: ${{ steps.post_test_final.outcome }}
          VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ runner.temp }}/journal-format-violations.txt
        run: scripts/validate-journal-format.sh

      - name: Validate summary format
        id: summary_format_final
        if: ${{ !cancelled() && steps.journal_format_final.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ runner.temp }}/summary-format-violations.txt
        run: scripts/validate-summary-format.sh

      - name: Validate append-only summaries
        id: summary_append_only_final
        if: ${{ !cancelled() && steps.summary_format_final.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ runner.temp }}/summary-append-only-violations.txt
        run: scripts/validate-summary-append-only.sh

      - name: Archive old journal entries
        id: archive_journal
        if: ${{ !cancelled() && steps.summary_append_only_final.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: scripts/archive-journal.sh

      - name: Archive old summary files
        id: archive_summaries
        if: ${{ !cancelled() && steps.archive_journal.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: scripts/archive-summaries.sh

      - name: Validate agent worktree
        id: agent_worktree_final
        if: ${{ !cancelled() && steps.archive_summaries.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          VALIDATE_AGENT_WORKTREE_SCOPE: changed
          VALIDATE_AGENT_WORKTREE_VIOLATIONS_FILE: ${{ runner.temp }}/agent-worktree-violations.txt
          AGENT_BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          AGENT_BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
        run: scripts/validate-agent-worktree.sh

      - name: Resolve accepted candidate finalization
        id: accepted_finalization
        if: ${{ !cancelled() && steps.candidate_validation.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          AGENT_RUN_MODE: ${{ steps.validation_policy.outputs.run_mode }}
          AGENT_ADVANCE_GARDEN: ${{ steps.validation_policy.outputs.advance_garden }}
          SNAPSHOT_HANDOFF_OUTCOME: ${{ steps.snapshot_accepted_handoff.outcome }}
          PREPARE_VERDICT_OUTCOME: ${{ steps.prepare_experiment_verdict.outcome }}
          ADVANCE_GARDEN_OUTCOME: ${{ steps.advance_garden.outcome }}
          AUTO_MEMORY_OUTCOME: ${{ steps.auto_memory.outcome }}
          RECORD_VERDICT_OUTCOME: ${{ steps.record_experiment_verdict.outcome }}
          SYNC_JOURNAL_OUTCOME: ${{ steps.sync_agent_journal.outcome }}
          REQUIRED_MEMORY_OUTCOME: ${{ steps.required_memory_final.outcome }}
          JOURNAL_FORMAT_OUTCOME: ${{ steps.journal_format_final.outcome }}
          SUMMARY_FORMAT_OUTCOME: ${{ steps.summary_format_final.outcome }}
          SUMMARY_APPEND_ONLY_OUTCOME: ${{ steps.summary_append_only_final.outcome }}
          ARCHIVE_JOURNAL_OUTCOME: ${{ steps.archive_journal.outcome }}
          ARCHIVE_SUMMARIES_OUTCOME: ${{ steps.archive_summaries.outcome }}
          AGENT_WORKTREE_OUTCOME: ${{ steps.agent_worktree_final.outcome }}
          AGENT_WORKTREE_SEVERITY: ${{ steps.agent_worktree_final.outputs.severity }}
        run: scripts/resolve-agent-finalization.sh

      - name: Collect failure diagnostics
        id: collect_failure_diagnostics
        if: ${{ failure() && !cancelled() }}
        shell: bash
        env:
          AGENT_CONTEXT_FILE: ${{ runner.temp }}/agent-context.md
          AGENT_CONTEXT_METADATA_FILE: ${{ runner.temp }}/agent-context.metadata
          AGENT_BASELINE_TEST_RESULT_FILE: ${{ runner.temp }}/baseline-test-result.md
          AGENT_BASELINE_POLICY_RESULT_FILE: ${{ runner.temp }}/baseline-policy-result.md
          AGENT_PRIMARY_GEMINI_ARTIFACTS_DIR: ${{ runner.temp }}/gemini-artifacts-attempt-1
          AGENT_ATTEMPT_ARTIFACTS_ROOT: ${{ runner.temp }}
          AGENT_ATTEMPT_LEDGER_FILE: ${{ runner.temp }}/agent-attempt-ledger.json
          AGENT_BASELINE_SHADOW_FILE: ${{ runner.temp }}/baseline-shadow.json
          AGENT_CANDIDATE_SHADOW_FILE: ${{ runner.temp }}/candidate-shadow.json
          AGENT_SHADOW_EVALUATION_RESULT_FILE: ${{ runner.temp }}/shadow-evaluation-result.json
        run: scripts/collect-agent-failure-diagnostics.sh "${{ runner.temp }}/agent-failure-diagnostics"

      - name: Upload failure diagnostics
        id: upload_failure_diagnostics
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: agent-failure-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/agent-failure-diagnostics/
          if-no-files-found: warn

      - name: Record workflow check status
        id: record_workflow_status
        if: ${{ !cancelled() && steps.accepted_finalization.outputs.complete == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          OBSERVATION_WINDOW_OUTCOME: ${{ steps.observation_window.outcome }}
          GEMINI_OUTCOME: ${{ steps.gemini.outcome }}
          AGENT_ATTEMPTS_COMPLETED: ${{ steps.attempt_resolution.outputs.attempts_completed }}
          AGENT_ATTEMPT_ACCEPTED: ${{ steps.attempt_resolution.outputs.accepted }}
          AGENT_ATTEMPT_ACCEPTANCE: ${{ steps.attempt_resolution.outputs.acceptance }}
          AGENT_ATTEMPT_EXHAUSTED: ${{ steps.attempt_resolution.outputs.exhausted }}
          GEMINI_PRIMARY_INSPECT_OUTCOME: ${{ steps.gemini_primary_inspect.outcome }}
          AGENT_INCOMPLETE_FEEDBACK_OUTCOME: ${{ steps.defer_agent_incomplete.outcome }}
          EXTRACT_AGENT_HANDOFF_OUTCOME: ${{ steps.extract_agent_handoff.outcome }}
          AGENT_HANDOFF_OUTCOME: ${{ steps.agent_handoff.outcome }}
          POST_TEST_OUTCOME: ${{ steps.post_test_final.outcome }}
          AGENT_RUN_MODE: ${{ steps.validation_policy.outputs.run_mode }}
          AGENT_SHADOW_POLICY: ${{ steps.validation_policy.outputs.shadow_policy }}
          CANDIDATE_VALIDATION_OUTCOME: ${{ steps.candidate_validation.outcome }}
          EXPERIMENT_VERDICT_OUTCOME: ${{ steps.record_experiment_verdict.outcome }}
          ADVANCE_GARDEN_OUTCOME: ${{ steps.advance_garden.outcome }}
          AUTO_MEMORY_OUTCOME: ${{ steps.auto_memory.outcome }}
          REQUIRED_MEMORY_OUTCOME: ${{ steps.required_memory_final.outcome }}
          JOURNAL_FORMAT_OUTCOME: ${{ steps.journal_format_final.outcome }}
          SUMMARY_FORMAT_OUTCOME: ${{ steps.summary_format_final.outcome }}
          SUMMARY_APPEND_ONLY_OUTCOME: ${{ steps.summary_append_only_final.outcome }}
          AGENT_WORKTREE_OUTCOME: ${{ steps.agent_worktree_final.outcome }}
          AGENT_WORKTREE_SEVERITY: ${{ steps.agent_worktree_final.outputs.severity }}
          AGENT_WORKTREE_REPAIR_INPUT_SEVERITY: ${{ steps.agent_worktree_repair_input.outputs.severity }}
        run: scripts/record-agent-status.sh

      - name: Collect change diagnostics
        id: collect_change_diagnostics
        if: ${{ !cancelled() && steps.accepted_finalization.outputs.complete == 'true' }}
        continue-on-error: true
        shell: bash
        run: scripts/collect-agent-change-diagnostics.sh "${{ runner.temp }}/agent-change-diagnostics.md"

      - name: Commit changes directly to main
        id: commit_changes
        if: ${{ !cancelled() && steps.accepted_finalization.outputs.complete == 'true' }}
        shell: bash
        env:
          COMMIT_MESSAGE_PREFIX: "feat: autonomous garden evolution"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%dT%H:%MZ"
        run: scripts/commit-if-changed.sh .

      - name: Preserve accepted candidate after finalization failure
        id: commit_accepted_fallback
        if: ${{ !cancelled() && steps.candidate_validation.outcome == 'success' && steps.accepted_finalization.outputs.complete != 'true' }}
        shell: bash
        env:
          AGENT_FINALIZATION_REASON: accepted-finalization=${{ steps.accepted_finalization.outcome }}; ${{ steps.accepted_finalization.outputs.reason }}
          COMMIT_MESSAGE_PREFIX: "feat: autonomous garden evolution"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%dT%H:%MZ"
        run: |
          scripts/prepare-accepted-candidate-fallback.sh \
            "${{ steps.attempt_resolution.outputs.best_candidate_commit }}" \
            "${{ steps.validation_policy.outputs.run_mode }}" \
            "${RUNNER_TEMP}/agent-attempt-ledger.json" \
            "${RUNNER_TEMP}/accepted-agent-run.json" \
            "${RUNNER_TEMP}/agent-shadow-feedback.md"
          scripts/commit-if-changed.sh .

      - name: Clean consumed rejected candidate branches
        id: cleanup_consumed_rejected_candidates
        if: ${{ !cancelled() && (steps.commit_changes.outcome == 'success' || steps.commit_accepted_fallback.outcome == 'success') }}
        shell: bash
        run: scripts/cleanup-rejected-candidate-branches.sh || echo "::warning::Rejected candidate branch cleanup will be retried by a later run."

      - name: Write workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          BASELINE_POLICY_OUTCOME: ${{ steps.baseline_policy.outcome }}
          OBSERVATION_WINDOW_OUTCOME: ${{ steps.observation_window.outcome }}
          GEMINI_OUTCOME: ${{ steps.gemini.outcome }}
          AGENT_ATTEMPTS_COMPLETED: ${{ steps.attempt_resolution.outputs.attempts_completed }}
          AGENT_ATTEMPT_ACCEPTED: ${{ steps.attempt_resolution.outputs.accepted }}
          AGENT_ATTEMPT_ACCEPTANCE: ${{ steps.attempt_resolution.outputs.acceptance }}
          AGENT_ATTEMPT_EXHAUSTED: ${{ steps.attempt_resolution.outputs.exhausted }}
          RESTORE_PROTECTED_OUTCOME: ${{ steps.restore_protected_attempt_1.outcome }}
          GEMINI_PRIMARY_INSPECT_OUTCOME: ${{ steps.gemini_primary_inspect.outcome }}
          AGENT_INCOMPLETE_FEEDBACK_OUTCOME: ${{ steps.defer_agent_incomplete.outcome }}
          INCOMPLETE_CANDIDATE_PUBLISH_OUTCOME: ${{ steps.publish_incomplete_candidate.outcome }}
