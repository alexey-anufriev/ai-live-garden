name: Evolve
run-name: "Evolve - ${{ github.run_number }}"

on:
  workflow_dispatch:

concurrency:
  group: ai-live-garden-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 42
    env:
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.1-flash-lite' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Baseline test
        id: baseline_test
        run: mvn -B test

      - name: Build Gemini prompt
        id: gemini_prompt
        shell: bash
        run: scripts/write-output-file.sh text .github/gemini/autonomous-run.md

      - name: Run Gemini autonomous step
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ env.GEMINI_MODEL }}
          prompt: ${{ steps.gemini_prompt.outputs.text }}
          upload_artifacts: true

      - name: Restore protected files
        if: ${{ !cancelled() }}
        shell: bash
        run: scripts/restore-evolve-protected-files.sh

      - name: Validate and repair tests after Gemini changes
        id: post_test_final
        uses: ./.github/actions/gemini-validate-repair
        with:
          validation-command: scripts/validate-tests.sh
          repair-prompt-command: scripts/write-test-repair-prompt.sh
          protected-restore-command: scripts/restore-evolve-protected-files.sh
          violations-file: ${{ runner.temp }}/post-test-violations.txt
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-model: ${{ env.GEMINI_MODEL }}
          artifact-name-prefix: post-test-repair

      - name: Advance persistent garden state
        id: advance_garden
        run: mvn -B -q exec:java -Dexec.args="tick --steps 3"

      - name: Validate and repair journal format
        id: journal_format_final
        uses: ./.github/actions/gemini-validate-repair
        with:
          validation-command: scripts/validate-journal-format.sh
          repair-prompt-command: scripts/write-journal-repair-prompt.sh
          protected-restore-command: scripts/restore-evolve-protected-files.sh
          violations-file: ${{ runner.temp }}/journal-format-violations.txt
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-model: ${{ env.GEMINI_MODEL }}
          artifact-name-prefix: journal-format-repair

      - name: Validate and repair summary format
        id: summary_format_final
        uses: ./.github/actions/gemini-validate-repair
        with:
          validation-command: scripts/validate-summary-format.sh
          repair-prompt-command: scripts/write-summary-format-repair-prompt.sh
          protected-restore-command: scripts/restore-evolve-protected-files.sh
          violations-file: ${{ runner.temp }}/summary-format-violations.txt
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-model: ${{ env.GEMINI_MODEL }}
          artifact-name-prefix: summary-format-repair

      - name: Validate and repair append-only summaries
        id: summary_append_only_final
        uses: ./.github/actions/gemini-validate-repair
        with:
          validation-command: scripts/validate-summary-append-only.sh
          repair-prompt-command: scripts/write-summary-repair-prompt.sh
          protected-restore-command: scripts/restore-evolve-protected-files.sh
          violations-file: ${{ runner.temp }}/summary-append-only-violations.txt
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-model: ${{ env.GEMINI_MODEL }}
          artifact-name-prefix: summary-append-only-repair

      - name: Archive old journal entries
        shell: bash
        run: scripts/archive-journal.sh

      - name: Archive old summary files
        shell: bash
        run: scripts/archive-summaries.sh

      - name: Record workflow check status
        shell: bash
        env:
          BASELINE_TEST_OUTCOME: ${{ steps.baseline_test.outcome }}
          GEMINI_OUTCOME: ${{ steps.gemini.outcome }}
          POST_TEST_OUTCOME: ${{ steps.post_test_final.outcome }}
          ADVANCE_GARDEN_OUTCOME: ${{ steps.advance_garden.outcome }}
          JOURNAL_FORMAT_OUTCOME: ${{ steps.journal_format_final.outcome }}
          SUMMARY_FORMAT_OUTCOME: ${{ steps.summary_format_final.outcome }}
          SUMMARY_APPEND_ONLY_OUTCOME: ${{ steps.summary_append_only_final.outcome }}
        run: scripts/record-evolve-status.sh

      - name: Commit changes directly to main
        shell: bash
        env:
          COMMIT_MESSAGE_PREFIX: "feat: autonomous garden evolution"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%dT%H:%MZ"
        run: scripts/commit-if-changed.sh .
