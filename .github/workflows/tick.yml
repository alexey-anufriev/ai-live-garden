name: Tick
run-name: "Tick - ${{ github.run_number }}"

on:
  workflow_dispatch:

concurrency:
  group: ai-live-garden-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Baseline test
        id: baseline_test
        timeout-minutes: 4
        shell: bash
        env:
          BASELINE_TEST_OUTPUT_LINES: "120"
        run: scripts/capture-tick-baseline-test.sh "${RUNNER_TEMP}/tick-baseline-test.md"

      - name: Record skipped tick
        if: steps.baseline_test.outputs.passed != 'true'
        shell: bash
        run: scripts/write-skipped-tick-summary.sh "${RUNNER_TEMP}/tick-baseline-test.md"

      - name: Advance persistent garden state
        id: advance_garden
        if: steps.baseline_test.outputs.passed == 'true'
        run: mvn -B -q exec:java -Dexec.args="tick --steps 5"

      - name: Update README garden state
        id: update_readme_state
        if: steps.baseline_test.outputs.passed == 'true'
        shell: bash
        run: scripts/update-readme-garden-state.sh

      - name: Commit changes directly to main
        if: steps.baseline_test.outputs.passed == 'true'
        shell: bash
        env:
          COMMIT_MESSAGE_PREFIX: "feat: garden tick"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%dT%H:%MZ"
        run: scripts/commit-if-changed.sh .
