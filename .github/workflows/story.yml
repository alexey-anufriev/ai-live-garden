name: Story
run-name: "Story - ${{ github.run_number }}"

on:
  workflow_dispatch:

concurrency:
  group: ai-live-garden-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  story:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load Gemini CLI settings
        id: gemini_cli_settings
        shell: bash
        run: scripts/write-output-file.sh settings .github/gemini-cli-settings.json

      - name: Prepare story context
        id: story_context
        shell: bash
        run: scripts/prepare-story-context.sh

      - name: Run Gemini chronicler
        id: gemini_story
        if: steps.story_context.outputs.skip != 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite
          prompt: ${{ steps.story_context.outputs.text }}
          settings: ${{ steps.gemini_cli_settings.outputs.settings }}
          upload_artifacts: true

      - name: Restore protected files
        if: ${{ !cancelled() && steps.story_context.outputs.skip != 'true' }}
        shell: bash
        run: scripts/restore-story-protected-files.sh

      - name: Update narrated garden-state commit
        if: steps.story_context.outputs.skip != 'true'
        shell: bash
        run: scripts/update-narrated-garden-state.sh "${{ steps.story_context.outputs.current_state_commit }}"

      - name: Commit story
        if: steps.story_context.outputs.skip != 'true'
        shell: bash
        env:
          COMMIT_MESSAGE_PREFIX: "docs: extend garden chronicle"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%d"
        run: scripts/commit-if-changed.sh story
