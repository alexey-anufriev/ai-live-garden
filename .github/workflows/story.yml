name: Story
run-name: "Story - ${{ github.run_number }}"

on:
  workflow_dispatch:

concurrency:
  group: ai-live-garden-main
  cancel-in-progress: false

permissions:
  contents: write

env:
  GEMINI_CLI_VERSION: "0.50.0"

jobs:
  story:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare story context
        id: story_context
        shell: bash
        run: scripts/prepare-story-context.sh

      - name: Run Gemini chronicler
        id: gemini_story
        if: steps.story_context.outputs.skip != 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ env.GEMINI_CLI_VERSION }}
          prompt: ${{ steps.story_context.outputs.text }}
          upload_artifacts: true

      - name: Restore protected files
        if: ${{ !cancelled() && steps.story_context.outputs.skip != 'true' }}
        shell: bash
        run: scripts/restore-story-protected-files.sh

      - name: Append story chapter
        if: steps.story_context.outputs.skip != 'true'
        shell: bash
        run: >
          scripts/story-append-chapter.sh
          --handoff-file .story-run.json
          --chapter-number "${{ steps.story_context.outputs.next_chapter }}"
          --volume-number "${{ steps.story_context.outputs.volume_number }}"
          --volume-file "${{ steps.story_context.outputs.volume_file }}"
          --new-volume "${{ steps.story_context.outputs.new_volume }}"
          --current-state-commit "${{ steps.story_context.outputs.current_state_commit }}"

      - name: Commit story
        if: steps.story_context.outputs.skip != 'true'
        shell: bash
        env:
          COMMIT_MESSAGE_PREFIX: "docs: extend garden chronicle"
          COMMIT_TIMESTAMP_FORMAT: "%Y-%m-%d"
        run: scripts/commit-if-changed.sh story
