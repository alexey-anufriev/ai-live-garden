name: Gemini Validate Repair
description: Run a validation command, ask Gemini to repair failures, and retry validation up to three times.

inputs:
  validation-command:
    description: Shell command that validates the workspace and exits nonzero on repairable failure.
    required: true
  repair-prompt-command:
    description: Shell command that writes a repair prompt to GITHUB_OUTPUT as output name `text`.
    required: true
  protected-restore-command:
    description: Optional command to restore protected files after each Gemini repair attempt.
    required: false
    default: ""
  violations-file:
    description: Path where the validation command records repairable violations.
    required: true
  gemini-api-key:
    description: Gemini API key.
    required: true
  gemini-model:
    description: Gemini model used for repair attempts.
    required: false
    default: gemini-3.1-flash-lite
  upload-artifacts:
    description: Whether to upload uniquely named artifacts for Gemini repair attempts.
    required: false
    default: "true"
  artifact-name-prefix:
    description: Prefix for repair attempt artifact names. Must be unique per use of this action in a workflow.
    required: false
    default: gemini-validate-repair
runs:
  using: composite
  steps:
    - name: Validate
      id: validate_initial
      continue-on-error: true
      shell: bash
      env:
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.validation-command }}

    - name: Build repair prompt 1
      if: ${{ steps.validate_initial.outcome == 'failure' }}
      id: repair_prompt_1
      shell: bash
      env:
        VALIDATE_REPAIR_ATTEMPT: "1"
        VALIDATE_REPAIR_MAX_ATTEMPTS: "3"
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_REPAIR_ATTEMPT: "1"
        SUMMARY_REPAIR_MAX_ATTEMPTS: "3"
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.repair-prompt-command }}

    - name: Collect pre-repair snapshot 1
      if: ${{ steps.validate_initial.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      shell: bash
      run: scripts/collect-repair-attempt-snapshot.sh "${RUNNER_TEMP}/${{ inputs.artifact-name-prefix }}-pre-repair-1" 1

    - name: Upload pre-repair snapshot 1
      if: ${{ steps.validate_initial.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name-prefix }}-pre-repair-1
        path: ${{ runner.temp }}/${{ inputs.artifact-name-prefix }}-pre-repair-1/
        if-no-files-found: warn

    - name: Repair 1
      if: ${{ steps.validate_initial.outcome == 'failure' }}
      uses: google-github-actions/run-gemini-cli@v0.1.22
      env:
        GEMINI_CLI_TRUST_WORKSPACE: "true"
      with:
        gemini_api_key: ${{ inputs.gemini-api-key }}
        gemini_model: ${{ inputs.gemini-model }}
        prompt: ${{ steps.repair_prompt_1.outputs.text }}
        upload_artifacts: false

    - name: Upload repair artifacts 1
      if: ${{ steps.validate_initial.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name-prefix }}-attempt-1
        path: gemini-artifacts/
        if-no-files-found: warn

    - name: Restore protected files after repair 1
      if: ${{ steps.validate_initial.outcome == 'failure' && inputs.protected-restore-command != '' && !cancelled() }}
      shell: bash
      run: ${{ inputs.protected-restore-command }}

    - name: Validate after repair 1
      if: ${{ steps.validate_initial.outcome == 'failure' }}
      id: validate_after_repair_1
      continue-on-error: true
      shell: bash
      env:
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.validation-command }}

    - name: Build repair prompt 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' }}
      id: repair_prompt_2
      shell: bash
      env:
        VALIDATE_REPAIR_ATTEMPT: "2"
        VALIDATE_REPAIR_MAX_ATTEMPTS: "3"
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_REPAIR_ATTEMPT: "2"
        SUMMARY_REPAIR_MAX_ATTEMPTS: "3"
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.repair-prompt-command }}

    - name: Collect pre-repair snapshot 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      shell: bash
      run: scripts/collect-repair-attempt-snapshot.sh "${RUNNER_TEMP}/${{ inputs.artifact-name-prefix }}-pre-repair-2" 2

    - name: Upload pre-repair snapshot 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name-prefix }}-pre-repair-2
        path: ${{ runner.temp }}/${{ inputs.artifact-name-prefix }}-pre-repair-2/
        if-no-files-found: warn

    - name: Repair 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' }}
      uses: google-github-actions/run-gemini-cli@v0.1.22
      env:
        GEMINI_CLI_TRUST_WORKSPACE: "true"
      with:
        gemini_api_key: ${{ inputs.gemini-api-key }}
        gemini_model: ${{ inputs.gemini-model }}
        prompt: ${{ steps.repair_prompt_2.outputs.text }}
        upload_artifacts: false

    - name: Upload repair artifacts 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name-prefix }}-attempt-2
        path: gemini-artifacts/
        if-no-files-found: warn

    - name: Restore protected files after repair 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && inputs.protected-restore-command != '' && !cancelled() }}
      shell: bash
      run: ${{ inputs.protected-restore-command }}

    - name: Validate after repair 2
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' }}
      id: validate_after_repair_2
      continue-on-error: true
      shell: bash
      env:
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.validation-command }}

    - name: Build repair prompt 3
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && steps.validate_after_repair_2.outcome == 'failure' }}
      id: repair_prompt_3
      shell: bash
      env:
        VALIDATE_REPAIR_ATTEMPT: "3"
        VALIDATE_REPAIR_MAX_ATTEMPTS: "3"
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_REPAIR_ATTEMPT: "3"
        SUMMARY_REPAIR_MAX_ATTEMPTS: "3"
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.repair-prompt-command }}

    - name: Collect pre-repair snapshot 3
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && steps.validate_after_repair_2.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      shell: bash
      run: scripts/collect-repair-attempt-snapshot.sh "${RUNNER_TEMP}/${{ inputs.artifact-name-prefix }}-pre-repair-3" 3

    - name: Upload pre-repair snapshot 3
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && steps.validate_after_repair_2.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name-prefix }}-pre-repair-3
        path: ${{ runner.temp }}/${{ inputs.artifact-name-prefix }}-pre-repair-3/
        if-no-files-found: warn

    - name: Repair 3
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && steps.validate_after_repair_2.outcome == 'failure' }}
      uses: google-github-actions/run-gemini-cli@v0.1.22
      env:
        GEMINI_CLI_TRUST_WORKSPACE: "true"
      with:
        gemini_api_key: ${{ inputs.gemini-api-key }}
        gemini_model: ${{ inputs.gemini-model }}
        prompt: ${{ steps.repair_prompt_3.outputs.text }}
        upload_artifacts: false

    - name: Upload repair artifacts 3
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && steps.validate_after_repair_2.outcome == 'failure' && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name-prefix }}-attempt-3
        path: gemini-artifacts/
        if-no-files-found: warn

    - name: Restore protected files after repair 3
      if: ${{ steps.validate_initial.outcome == 'failure' && steps.validate_after_repair_1.outcome == 'failure' && steps.validate_after_repair_2.outcome == 'failure' && inputs.protected-restore-command != '' && !cancelled() }}
      shell: bash
      run: ${{ inputs.protected-restore-command }}

    - name: Final validation
      if: ${{ steps.validate_initial.outcome == 'failure' }}
      shell: bash
      env:
        VALIDATE_REPAIR_VIOLATIONS_FILE: ${{ inputs.violations-file }}
        SUMMARY_APPEND_ONLY_VIOLATIONS_FILE: ${{ inputs.violations-file }}
      run: ${{ inputs.validation-command }}
